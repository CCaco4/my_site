<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Contatta Ruzzon Wood Design." />
    <title>Ruzzon Wood Design | Contatti</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
    <script defer src="../assets/js/auth.js"></script>
    <script defer src="../assets/js/main.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#contenuto-principale">Salta al contenuto principale</a>

    <header class="site-header">
      <div class="container header-content">
        <a class="logo" href="../index.html" aria-label="Ruzzon Wood Design - vai alla home">
          Ruzzon Wood Design
        </a>
        <button class="menu-toggle" type="button" aria-controls="nav-principale" aria-expanded="false">Menu</button>
        <nav id="nav-principale" class="main-nav" aria-label="Navigazione principale">
          <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="shop.html">Progetti</a></li>
            <li><a href="login.html">Servizi</a></li>
            <li><a aria-current="page" href="register.html">Contatti</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="contenuto-principale" class="form-page">
      <section class="container narrow" aria-labelledby="contact-title">
        <h1 id="contact-title">Contattaci</h1>
        <p>Raccontaci il tuo progetto: ti risponderemo con una proposta personalizzata.</p>

        <form id="contact-form" class="auth-form" novalidate>
          <div class="form-group">
            <label for="contact-name">Nome e cognome</label>
            <input id="contact-name" name="name" type="text" autocomplete="name" required />
            <p id="contact-name-error" class="error-message" aria-live="polite"></p>
          </div>

          <div class="form-group">
            <label for="contact-email">Email</label>
            <input id="contact-email" name="email" type="email" autocomplete="email" required />
            <p id="contact-email-error" class="error-message" aria-live="polite"></p>
          </div>

          <div class="form-group">
            <label for="contact-phone">Telefono</label>
            <input id="contact-phone" name="phone" type="text" autocomplete="tel" />
          </div>

          <div class="form-group">
            <label for="contact-message">Messaggio</label>
            <textarea id="contact-message" name="message" rows="5" required></textarea>
            <p id="contact-message-error" class="error-message" aria-live="polite"></p>
          </div>

          <button type="submit" class="button primary full-width">Invia richiesta</button>
          <p id="contact-status" class="status-message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <p>&copy; 2026 Ruzzon Wood Design. Tutti i diritti riservati.</p>
        <span>Via Esempio 12, Italia · +39 000 000000</span>
      </div>
    </footer>
  </body>
</html>
