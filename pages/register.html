<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Crea un account ShopWave." />
    <title>ShopWave | Registrazione</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
    <script defer src="../assets/js/auth.js"></script>
    <script defer src="../assets/js/main.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#contenuto-principale">Salta al contenuto principale</a>

    <header class="site-header">
      <div class="container header-content">
        <a class="logo" href="../index.html" aria-label="ShopWave - vai alla home">ShopWave</a>
        <button
          class="menu-toggle"
          type="button"
          aria-controls="nav-principale"
          aria-expanded="false"
        >
          Menu
        </button>
        <nav id="nav-principale" class="main-nav" aria-label="Navigazione principale">
          <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a aria-current="page" href="register.html">Registrazione</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="contenuto-principale" class="form-page">
      <div class="container narrow">
        <h1>Crea il tuo account</h1>
        <p>Compila il modulo per iniziare.</p>

        <form id="register-form" class="auth-form" novalidate>
          <div class="form-group">
            <label for="register-name">Nome completo</label>
            <input id="register-name" name="name" type="text" autocomplete="name" required />
            <p id="register-name-error" class="error-message" aria-live="polite"></p>
          </div>

          <div class="form-group">
            <label for="register-email">Email</label>
            <input
              id="register-email"
              name="email"
              type="email"
              autocomplete="email"
              required
            />
            <p id="register-email-error" class="error-message" aria-live="polite"></p>
          </div>

          <div class="form-group">
            <label for="register-password">Password</label>
            <input
              id="register-password"
              name="password"
              type="password"
              autocomplete="new-password"
              required
              minlength="8"
            />
            <p id="register-password-error" class="error-message" aria-live="polite"></p>
          </div>

          <div class="form-group checkbox-group">
            <input id="register-terms" name="terms" type="checkbox" required />
            <label for="register-terms">Accetto i termini e le condizioni (placeholder)</label>
          </div>
          <p id="register-terms-error" class="error-message" aria-live="polite"></p>

          <button type="submit" class="button primary full-width">Registrati</button>
          <p class="helper-text">Hai già un account? <a href="login.html">Accedi</a>.</p>
          <p id="register-status" class="status-message" aria-live="polite"></p>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <p>&copy; 2026 ShopWave. Tutti i diritti riservati.</p>
        <a href="#">Cookie (placeholder)</a>
      </div>
    </footer>
  </body>
</html>
