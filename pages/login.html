<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Accedi a ShopWave." />
    <title>ShopWave | Login</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
    <script defer src="../assets/js/auth.js"></script>
    <script defer src="../assets/js/main.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#contenuto-principale">Salta al contenuto principale</a>

    <header class="site-header">
      <div class="container header-content">
        <a class="logo" href="../index.html" aria-label="ShopWave - vai alla home">ShopWave</a>
        <button
          class="menu-toggle"
          type="button"
          aria-controls="nav-principale"
          aria-expanded="false"
        >
          Menu
        </button>
        <nav id="nav-principale" class="main-nav" aria-label="Navigazione principale">
          <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a aria-current="page" href="login.html">Login</a></li>
            <li><a href="register.html">Registrazione</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="contenuto-principale" class="form-page">
      <div class="container narrow">
        <h1>Accedi al tuo account</h1>
        <p>Inserisci le tue credenziali per continuare.</p>

        <form id="login-form" class="auth-form" novalidate>
          <div class="form-group">
            <label for="login-email">Email</label>
            <input id="login-email" name="email" type="email" autocomplete="email" required />
            <p id="login-email-error" class="error-message" aria-live="polite"></p>
          </div>

          <div class="form-group">
            <label for="login-password">Password</label>
            <input
              id="login-password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              minlength="8"
            />
            <p id="login-password-error" class="error-message" aria-live="polite"></p>
          </div>

          <button type="submit" class="button primary full-width">Entra</button>
          <p class="helper-text">Non hai un account? <a href="register.html">Registrati</a>.</p>
          <p id="login-status" class="status-message" aria-live="polite"></p>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <p>&copy; 2026 ShopWave. Tutti i diritti riservati.</p>
        <a href="#">Termini (placeholder)</a>
      </div>
    </footer>
  </body>
</html>
